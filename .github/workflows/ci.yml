name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Build Docker image
        run: docker build -t taskflow .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag taskflow ${{ secrets.DOCKER_USERNAME }}/taskflow:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:latest

      - name: Deploy to EC2 using Docker Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
           
            cd ~/taskflow || git clone https://github.com/parv166/taskflow.git && cd taskflow

            git reset --hard
            git pull

            docker-compose down || true
            docker-compose pull
            docker-compose up -d
