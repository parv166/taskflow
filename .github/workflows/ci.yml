name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Build Docker image
        run: docker build -t taskflow .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: docker tag taskflow ${{ secrets.DOCKER_USERNAME }}/taskflow:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker rm -f taskflow || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskflow:latest
            docker run -d \
              --name taskflow \
              --network taskflow-net \
              -p 80:8080 \
              ${{ secrets.DOCKER_USERNAME }}/taskflow:latest
